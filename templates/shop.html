<!-- Breadcrumbs -->
<div class="bg-brand-50 border-b border-brand-100 py-4">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-xs sm:text-sm text-slate-500 font-sans">
    <a href="{{PATH_PREFIX}}index" class="hover:text-brand-500 transition-colors">হোম</a>
    <span class="mx-2">/</span>
    <span class="text-slate-800 font-medium">শপ</span>
  </div>
</div>

<!-- Shop Section -->
<section class="py-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" x-data="shopFilter()">
  <div class="flex flex-col lg:flex-row gap-8">
    
    <!-- Sidebar / Filters -->
    <aside class="w-full lg:w-64 flex-none space-y-8">
      
      <!-- Search -->
      <div class="bg-white p-6 rounded-2xl border border-brand-100 shadow-xs">
         <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 font-sans">অনুসন্ধান</h3>
        <div class="relative">
          <input type="text" x-model="searchQuery" @input="filterProducts()" placeholder="পণ্য খুঁজুন..." class="w-full text-sm border border-slate-200 rounded-lg pl-3 pr-8 py-2 focus:ring-1 focus:ring-brand-400 focus:border-brand-400 outline-none">
          <svg class="absolute right-2.5 top-2.5 w-4 h-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
      </div>

      <!-- Categories Filter -->
      <div class="bg-white p-6 rounded-2xl border border-brand-100 shadow-xs">
        <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 font-sans">ক্যাটাগরি</h3>
        <div class="flex flex-col gap-2">
          <button @click="setCategory('all')" 
                  :class="activeCategory === 'all' ? 'bg-brand-500 text-white font-semibold' : 'text-slate-600 hover:bg-brand-50'" 
                  class="w-full text-left text-sm px-3 py-2 rounded-lg transition-all flex justify-between items-center">
            <span>সব পণ্য</span>
          </button>
          {{CATEGORIES_FILTER_LIST}}
        </div>
      </div>

      <!-- Price Filter -->
      <div class="bg-white p-6 rounded-2xl border border-brand-100 shadow-xs">
        <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 font-sans font-semibold">সর্বোচ্চ মূল্য</h3>
        <div class="space-y-4">
          <input type="range" min="0" max="1000" step="10" x-model="maxPrice" @input="filterProducts()" class="w-full h-2 bg-brand-100 rounded-lg appearance-none cursor-pointer accent-brand-500">
          <div class="flex justify-between text-xs text-slate-500 font-sans font-semibold">
            <span>০ টাকা</span>
            <span class="text-brand-600 bg-brand-50 px-2.5 py-1 rounded-full border border-brand-100" x-text="maxPrice + ' টাকা'"></span>
            <span>১০০০ টাকা</span>
          </div>
        </div>
      </div>

      <!-- Stock Filter -->
      <div class="bg-white p-6 rounded-2xl border border-brand-100 shadow-xs flex items-center justify-between">
        <span class="text-sm font-bold text-slate-700 uppercase tracking-wider font-sans">স্টকে আছে</span>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" x-model="inStockOnly" @change="filterProducts()" class="sr-only peer">
          <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
        </label>
      </div>

      <!-- Sort By -->
      <div class="bg-white p-6 rounded-2xl border border-brand-100 shadow-xs">
        <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 font-sans">ক্রম সাজান</h3>
        <select x-model="sortBy" @change="sortProducts()" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:ring-1 focus:ring-brand-400 focus:border-brand-400 outline-none bg-white">
          <option value="featured">ফিচার্ড</option>
          <option value="price-asc">দাম: কম থেকে বেশি</option>
          <option value="price-desc">দাম: বেশি থেকে কম</option>
          <option value="rating">রেটিং</option>
        </select>
      </div>

    </aside>

    <!-- Products Grid -->
    <main class="flex-grow space-y-8">
      
      <!-- Top Bar info -->
      <div class="flex justify-between items-center bg-white p-4 rounded-xl border border-brand-100 shadow-xs">
        <p class="text-xs sm:text-sm text-slate-500 font-sans">
          <span class="font-bold text-slate-800" x-text="visibleCount"></span>টি পণ্য দেখানো হচ্ছে
        </p>
      </div>

      <!-- Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="shop-products-grid">
        {{SHOP_PRODUCTS_LIST}}
      </div>

      <!-- No Products Found -->
      <div x-show="visibleCount === 0" class="bg-white rounded-2xl border border-brand-100 p-12 text-center shadow-xs" x-cloak>
        <div class="text-4xl mb-4">🔍</div>
        <h3 class="text-base font-bold text-slate-700">কোনো পণ্য পাওয়া যায়নি</h3>
        <p class="text-xs text-slate-400 mt-1">অনুগ্রহ করে আপনার ফিল্টার বা অনুসন্ধান শব্দ পরিবর্তন করে চেষ্টা করুন।</p>
        <button @click="resetFilters()" class="mt-4 px-4 py-2 bg-brand-500 text-white rounded-lg text-xs font-semibold hover:bg-brand-600 shadow-sm transition-all">ফিল্টার রিসেট করুন</button>
      </div>

    </main>

  </div>
</section>

<script>
  function shopFilter() {
    return {
      activeCategory: 'all',
      searchQuery: '',
      sortBy: 'featured',
      visibleCount: 0,
      maxPrice: 1000,
      inStockOnly: false,

      init() {
        // Run initial count
        this.filterProducts();
        
        // Handle direct category link hash (e.g. shop#fruits)
        const hash = window.location.hash;
        if (hash && hash.startsWith('#')) {
          const categoryId = hash.substring(1);
          this.setCategory(categoryId);
        }
      },

      setCategory(cat) {
        this.activeCategory = cat;
        this.filterProducts();
      },

      resetFilters() {
        this.activeCategory = 'all';
        this.searchQuery = '';
        this.sortBy = 'featured';
        this.maxPrice = 1000;
        this.inStockOnly = false;
        this.filterProducts();
      },

      filterProducts() {
        const cards = document.querySelectorAll('.product-card-item');
        let count = 0;
        
        cards.forEach(card => {
          const cat = card.getAttribute('data-category');
          const name = card.getAttribute('data-name').toLowerCase();
          const price = parseFloat(card.getAttribute('data-price')) || 0;
          const inStock = card.getAttribute('data-in-stock') === 'true';
          
          const matchesCategory = (this.activeCategory === 'all' || cat === this.activeCategory);
          const matchesSearch = (name.includes(this.searchQuery.toLowerCase()));
          const matchesPrice = (price <= this.maxPrice);
          const matchesStock = (!this.inStockOnly || inStock);
          
          if (matchesCategory && matchesSearch && matchesPrice && matchesStock) {
            card.style.display = '';
            count++;
          } else {
            card.style.display = 'none';
          }
        });
        
        this.visibleCount = count;
        this.sortProducts();
      },

      sortProducts() {
        const grid = document.getElementById('shop-products-grid');
        const cards = Array.from(grid.querySelectorAll('.product-card-item'));
        
        cards.sort((a, b) => {
          if (this.sortBy === 'price-asc') {
            return parseFloat(a.getAttribute('data-price')) - parseFloat(b.getAttribute('data-price'));
          } else if (this.sortBy === 'price-desc') {
            return parseFloat(b.getAttribute('data-price')) - parseFloat(a.getAttribute('data-price'));
          } else if (this.sortBy === 'rating') {
            return parseFloat(b.getAttribute('data-rating')) - parseFloat(a.getAttribute('data-rating'));
          } else {
            // Featured - maintain original order in JS
            return parseInt(a.getAttribute('data-index')) - parseInt(b.getAttribute('data-index'));
          }
        });
        
        // Re-append sorted elements
        cards.forEach(card => grid.appendChild(card));
      }
    };
  }
</script>
